version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: quantumpilot
      POSTGRES_PASSWORD: quantumpilot
      POSTGRES_DB: quantumpilot_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      IBM_TOKEN: ${IBM_TOKEN}
      IBM_CRN: ${IBM_CRN}
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    volumes:
      - ./datasets:/app/datasets
    depends_on:
      - postgres
      - redis
      - rabbitmq
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:

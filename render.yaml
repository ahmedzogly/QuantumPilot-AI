services:
  - type: web
    name: quantumpilot-backend
    env: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: quantumpilot-postgres
          property: host
      - key: POSTGRES_USER
        fromDatabase:
          name: quantumpilot-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: quantumpilot-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: quantumpilot-postgres
          property: database
      - key: REDIS_URL
        fromService:
          type: redis
          name: quantumpilot-redis
          property: connectionString
      - key: IBM_TOKEN
        sync: false
      - key: IBM_CRN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: quantumpilot-frontend
    env: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://quantumpilot-backend.onrender.com/api/v1
      - key: NODE_ENV
        value: production

  - type: redis
    name: quantumpilot-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
    region: oregon

databases:
  - name: quantumpilot-postgres
    databaseName: quantumpilot_db
    user: quantumpilot
    plan: starter
    region: oregon

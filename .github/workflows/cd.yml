name: CD - Deploy Production

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: quantumpilot/backend:${{ github.ref_name }}, quantumpilot/backend:latest
      
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: quantumpilot/frontend:${{ github.ref_name }}, quantumpilot/frontend:latest
      
      - name: Deploy to production (example)
        run: |
          echo "Deploying ${{ github.ref_name }} to production..."
          echo "Live backends: ibm_fez 135.6us, kingston 231us BEST"
          echo "Space Weather: NOAA kp live + neutron cosmic ray"
          echo "Models: reward_net_deep.pt 80K + drift_lstm.pt 21K"
